<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수학 문제 생성기</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- ===== 헤더 ===== -->
  <header>
    <h1>수학 문제 생성기</h1>
    <div class="wid-input-group">
      <input
        type="text"
        id="wid-input"
        placeholder="E2-03-X7K2M"
        maxlength="11"
        aria-label="문제집 번호 입력"
      />
      <button id="btn-wid-go">이동 →</button>
      <span id="wid-error">올바른 번호를 입력하세요</span>
    </div>
  </header>

  <div class="container">
    <!-- ===== 컨트롤 카드 ===== -->
    <div class="card">
      <div class="grade-tabs" id="grade-tabs"></div>
      <div class="chapter-list" id="chapter-list"></div>
      <div class="controls-row">
        <span class="sheet-count-label">출력 장 수:</span>
        <div class="sheet-count-input">
          <button id="btn-count-down">−</button>
          <input type="number" id="sheet-count" value="1" min="1" max="20" />
          <button id="btn-count-up">+</button>
        </div>
        <button class="btn-primary" id="btn-generate">생성 및 미리보기</button>
        <button class="btn-secondary" id="btn-print">인쇄하기 🖨️</button>
      </div>
    </div>

    <!-- ===== 미리보기 카드 ===== -->
    <div class="card" id="preview-card" style="display: none">
      <div class="preview-nav">
        <button id="btn-prev">◀ 이전</button>
        <span class="page-info" id="page-info">1 / 1</span>
        <button id="btn-next">다음 ▶</button>
      </div>

      <div class="preview-header">
        <div class="preview-wid-block">
          <h3 id="preview-wid-text">—</h3>
          <p>QR·번호로 이 장만 재접속 가능</p>
        </div>
        <div id="preview-qr"></div>
      </div>

      <div id="preview-problems" class="problem-grid cols-4"></div>

      <div class="answer-toggle-row">
        <button class="btn-secondary" id="answer-toggle-btn">정답 보기 ▼</button>
      </div>
      <div id="answer-section" style="display: none">
        <div id="preview-answers" class="answer-grid"></div>
      </div>

      <p class="hint-text">문제집 번호를 공유하면 동일한 문제를 다시 생성할 수 있어요.</p>
    </div>
  </div>

  <!-- ===== 인쇄 전용 영역 ===== -->
  <div class="print-only" id="print-area"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
