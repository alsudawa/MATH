<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수학 문제 생성기</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" crossorigin src="/math/assets/index-cVHHlN1b.js"></script>
  <link rel="stylesheet" crossorigin href="/math/assets/index-BcHiAnW5.css">
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">✏️</span>
        <div>
          <h1>수학 문제 생성기</h1>
          <p class="header-sub">학년과 챕터를 선택하고 문제를 만들어 보세요</p>
        </div>
      </div>
      <div class="wid-input-group">
        <input
          type="text"
          id="wid-input"
          placeholder="E2-03-X7K2M"
          maxlength="11"
          aria-label="문제집 번호 입력"
        />
        <button id="btn-wid-go">이동</button>
        <span id="wid-error">올바른 번호가 아니에요</span>
      </div>
    </div>
  </header>

  <main>

    <!-- ===== STEP 1: 학년 선택 ===== -->
    <section class="step-section">
      <div class="step-label">
        <span class="step-num">1</span>
        <span>학년을 선택하세요</span>
      </div>
      <div class="grade-grid" id="grade-tabs"></div>
    </section>

    <!-- ===== STEP 2: 챕터 선택 ===== -->
    <section class="step-section">
      <div class="step-label">
        <span class="step-num">2</span>
        <span>챕터를 선택하세요</span>
      </div>
      <div class="chapter-list" id="chapter-list"></div>
    </section>

    <!-- ===== STEP 3: 장 수 + 생성 ===== -->
    <section class="step-section">
      <div class="step-label">
        <span class="step-num">3</span>
        <span>몇 장 만들까요?</span>
      </div>
      <div class="generate-row">
        <div class="sheet-count-wrap">
          <button class="count-btn" id="btn-count-down">−</button>
          <input type="number" id="sheet-count" value="1" min="1" max="20" />
          <button class="count-btn" id="btn-count-up">+</button>
          <span class="count-hint">장 (최대 20장)</span>
        </div>
        <button class="btn-generate" id="btn-generate">
          <span>문제 생성하기</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </section>

    <!-- ===== 미리보기 ===== -->
    <section id="preview-section" style="display:none">
      <div class="preview-toolbar">
        <div class="preview-nav">
          <button id="btn-prev">◀</button>
          <span id="page-info">1 / 1</span>
          <button id="btn-next">▶</button>
        </div>
        <div class="preview-wid">
          <span class="wid-badge" id="preview-wid-text">—</span>
          <span class="wid-hint">번호를 공유하면 동일한 문제를 다시 볼 수 있어요</span>
        </div>
        <div class="preview-actions">
          <button class="btn-answer" id="answer-toggle-btn">정답 보기</button>
          <button class="btn-print" id="btn-print">🖨️ 인쇄</button>
        </div>
      </div>

      <div class="preview-card">
        <div class="preview-card-header">
          <div id="preview-qr"></div>
        </div>
        <div id="preview-problems" class="problem-grid cols-4"></div>
      </div>

      <div id="answer-section" style="display:none">
        <div class="answer-card">
          <h4 class="answer-title">정답</h4>
          <div id="preview-answers" class="answer-grid"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== 인쇄 전용 ===== -->
  <div class="print-only" id="print-area"></div>

</body>
</html>
